<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolishMaster</title>
  <meta
    name="description"
    content="Turn raw 3D prints into premium-looking products with a simple finishing system."
  />
  <style>
    :root {
      --bg: #000000;
      --panel: #0f0f10;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, 0.68);
      --accent: #ff6a00;
      --accent-dark: #e55e00;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 106, 0, 0.18), transparent 30%),
        linear-gradient(180deg, #000000 0%, #050505 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(18, 18, 19, 0.96), rgba(9, 9, 10, 0.96));
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 9vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 16px auto 0;
      max-width: 32ch;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .visual {
      margin: 28px auto 0;
      padding: 18px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 106, 0, 0.2), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .visual img {
      width: min(100%, 240px);
      margin: 0 auto;
      filter: drop-shadow(0 24px 36px rgba(0, 0, 0, 0.55));
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      margin-top: 28px;
      padding: 14px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .cta:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .note {
      margin-top: 14px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.42);
    }

    @media (min-width: 768px) {
      .section {
        padding: 40px;
      }

      .card {
        width: min(100%, 980px);
        padding: 40px;
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 32px;
        text-align: left;
        align-items: center;
      }

      p {
        margin-left: 0;
      }

      .visual {
        margin-top: 0;
      }

      .visual img {
        width: min(100%, 320px);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="section">
      <div class="card">
        <div>
          <span class="eyebrow">PolishMaster</span>
          <h1>Make Your Prints Worth Selling</h1>
          <p>
            A simple finishing system that helps turn rough 3D prints into clean,
            premium-looking products.
          </p>
          <a class="cta" href="#">Join Now</a>
          <div class="note">$19.99 / month</div>
        </div>

        <div class="visual">
          <img src="king.png" alt="Polished 3D printed chess king" />
        </div>
      </div>
    </section>
  </main>
</body>
</html>
