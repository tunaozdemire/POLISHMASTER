<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolishMaster</title>
  <meta
    name="description"
    content="Turn raw 3D prints into premium-looking products with a simple finishing system."
  />
  <style>
  :root {
    --bg: #050505;
    --panel: rgba(16,16,18,0.96);
    --line: rgba(255,255,255,0.08);
    --text: #f7efe8;
    --muted: rgba(255,255,255,0.72);
    --accent: #ff6a00;
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
    --r-card: 24px;
    --r-btn: 18px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
    background: #000;
    overscroll-behavior: none;
  }

  body {
    min-height: 100vh;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at 18% 14%, rgba(255,106,0,0.13), transparent 28%),
      radial-gradient(circle at 82% 8%, rgba(255,106,0,0.04), transparent 26%),
      linear-gradient(180deg, #000 0%, #080808 100%);
    overflow-x: hidden;
    overscroll-behavior-y: none;
  }

  body.modal-open {
    position: fixed;
    left: 0;
    right: 0;
    overflow-y: scroll;
  }

  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; }
