<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolishMaster</title>
  <meta
    name="description"
    content="Turn raw 3D prints into premium-looking products with a simple finishing system."
  />
  <style>
    :root {
      --bg: #000000;
      --panel: #0f0f10;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, 0.68);
      --accent: #ff6a00;
      --accent-dark: #e55e00;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 50% 50%, transparent 1.5px, #000 0 8px, transparent 8px),
        radial-gradient(circle at 50% 50%, transparent 1.5px, #000 0 8px, transparent 8px),
        radial-gradient(circle at 18% 18%, rgba(255, 0, 90, 0.2), transparent 26%),
        radial-gradient(circle at 82% 22%, rgba(255, 220, 0, 0.16), transparent 24%),
        radial-gradient(circle at 30% 82%, rgba(0, 255, 140, 0.14), transparent 26%),
        radial-gradient(ellipse at 72% 72%, rgba(0, 110, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #000000 0%, #050505 100%);
      background-size:
        10px 17.32px,
        10px 17.32px,
        160% 160%,
        160% 160%,
        180% 180%,
        180% 180%,
        100% 100%;
      background-position:
        0 0,
        5px 8.66px,
        0% 0%,
        100% 0%,
        0% 100%,
        100% 100%,
        0 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      animation: gradientShift 22s linear infinite, hueSpin 10s linear infinite;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(18, 18, 19, 0.96), rgba(9, 9, 10, 0.96));
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 9vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      margin: 16px auto 0;
      max-width: 32ch;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .visual {
      margin: 28px auto 0;
      padding: 18px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 106, 0, 0.2), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .visual img {
      width: min(100%, 240px);
      margin: 0 auto;
      filter: drop-shadow(0 24px 36px rgba(0, 0, 0, 0.55));
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      margin-top: 28px;
      padding: 15px 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      overflow: hidden;
      isolation: isolate;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 12px 28px rgba(0, 0, 0, 0.34);
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: -140% -30%;
      z-index: -2;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.24), transparent 34%);
      opacity: 0.75;
      transform: translate(-32%, -34%) scale(0.55);
      animation: spotlight 3.2s ease-in-out infinite;
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02) 42%, rgba(255, 106, 0, 0.18) 100%),
        rgba(10, 10, 11, 0.94);
    }

    .cta:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 18px 40px rgba(0, 0, 0, 0.42),
        0 0 28px rgba(255, 106, 0, 0.18);
    }

    .cta-text {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.78) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes spotlight {
      0% {
        opacity: 0.22;
        transform: translate(-38%, -38%) scale(0.5);
      }
      50% {
        opacity: 0.92;
        transform: translate(-8%, -18%) scale(1);
      }
      100% {
        opacity: 0.22;
        transform: translate(18%, -10%) scale(0.72);
      }
    }

    @keyframes gradientShift {
      0% {
        background-position:
          0 0,
          5px 8.66px,
          0% 0%,
          100% 0%,
          0% 100%,
          100% 100%,
          0 0;
      }
      100% {
        background-position:
          0 0,
          5px 8.66px,
          180% 80%,
          -60% 120%,
          120% -40%,
          -40% 40%,
          0 0;
      }
    }

    @keyframes hueSpin {
      0% {
        filter: hue-rotate(0deg);
      }
      100% {
        filter: hue-rotate(360deg);
      }
    }

    .note {
      margin-top: 14px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.42);
    }

    @media (min-width: 768px) {
      .section {
        padding: 40px;
      }

      .card {
        width: min(100%, 980px);
        padding: 40px;
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 32px;
        text-align: left;
        align-items: center;
      }

      p {
        margin-left: 0;
      }

      .visual {
        margin-top: 0;
      }

      .visual img {
        width: min(100%, 320px);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="section">
      <div class="card">
        <div>
          <span class="eyebrow">PolishMaster</span>
          <h1>Make Your Prints Worth Selling</h1>
          <p>
            A simple finishing system that helps turn rough 3D prints into clean,
            premium-looking products.
          </p>
          <a class="cta" href="#"><span class="cta-text">Join Now</span></a>
          <div class="note">$19.99 / month</div>
        </div>

        <div class="visual">
          <img src="king.png" alt="Polished 3D printed chess king" />
        </div>
      </div>
    </section>
  </main>
</body>
</html>
